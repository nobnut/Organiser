<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recurring Organiser</title>
    <style>
        /* === MATERIAL 3 EXPRESSIVE DARK THEME === */
        :root {
            --md-sys-color-background: #1A1C19;
            --md-sys-color-on-background: #E2E3DD;
            --md-sys-color-surface: #2A2C29; 
            --md-sys-color-on-surface: #E2E3DD;
            --md-sys-color-on-surface-variant: #C2C9BD; 
            --md-sys-color-primary: #9CD67D; 
            --md-sys-color-on-primary: #0C3900;
            --md-sys-color-primary-container: #265108;
            --md-sys-color-error: #FFB4AB; 
            --md-sys-color-error-container: #93000A;
            --md-sys-color-outline: #8C9388;
            
            /* Status Colors */
            --status-red: #4A1515;    /* Overdue */
            --status-orange: #4A2E15; /* Today */
            --status-green: #154A1C;  /* < 2 Days */
            --status-blue: #15304A;   /* > 2 Days */

            --radius-large: 28px;
            --radius-medium: 16px;
            --spacing: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 { text-align: center; font-size: 24px; font-weight: 700; margin: 20px 0 10px 0; }

        #main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: var(--spacing); }
        
        #filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #task-grid {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--spacing);
            align-content: start; 
            padding-bottom: 160px; 
        }

        .task-card {
            border-radius: var(--radius-medium);
            padding: var(--spacing);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            user-select: none;
            min-height: 110px;
            flex-shrink: 0;
        }
        .task-card:active { transform: scale(0.98); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .card-title { font-weight: bold; font-size: 18px; line-height: 1.2; padding-right: 8px;}
        .card-date { font-size: 13px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; font-weight: 600;}
        .card-preview { font-size: 14px; color: var(--md-sys-color-on-surface); margin-bottom: 12px; line-height: 1.4;}
        
        .section-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--md-sys-color-on-surface-variant);
            margin: 16px 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-header:first-child { margin-top: 0; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; align-items: center;}
        .tag-chip { 
            background-color: rgba(255, 255, 255, 0.15); 
            color: var(--md-sys-color-on-surface); 
            font-size: 11px; 
            font-weight: 600;
            padding: 6px 12px; 
            border-radius: 12px; 
            white-space: nowrap; 
            display: inline-flex;
            align-items: center;
        }
        .tag-chip.active-filter {
            background-color: var(--md-sys-color-primary) !important;
            color: var(--md-sys-color-on-primary) !important;
        }

        .complete-btn {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        /* === BOTTOM BAR === */
        #bottom-bar {
            position: fixed;
            bottom: var(--spacing);
            left: var(--spacing);
            right: var(--spacing);
            display: flex;
            gap: 8px;
            height: 56px;
        }

        .btn { border: none; border-radius: 100px; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-primary { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); flex: 1;}
        .btn-icon { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); flex: 0 0 56px; font-size: 20px;}

        /* === MODALS === */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--md-sys-color-background);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
            padding: var(--spacing);
        }
        .modal.active { transform: translateY(0); }
        
        .modal-content {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--radius-large);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            border: 1px solid var(--md-sys-color-outline);
        }

        .modal-header { font-size: 22px; font-weight: bold; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;}
        
        .editor-input { background: transparent; border: none; color: var(--md-sys-color-on-background); font-family: inherit; outline: none; width: 100%; margin-bottom: 16px;}
        #edit-title { font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;}
        #edit-desc { flex: 1; resize: none; font-size: 16px; line-height: 1.5; background: rgba(0,0,0,0.1); padding: 12px; border-radius: 8px;}
        
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .form-label { font-size: 12px; color: var(--md-sys-color-on-surface-variant); font-weight: bold; text-transform: uppercase;}
        .form-control { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; font-size: 15px; font-family: inherit; width: 100%;}

        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 12px; }
        .text-btn { background: none; border: none; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; padding: 8px 16px; }
        .settings-btn { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); border: none; padding: 16px; border-radius: var(--radius-medium); font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
    </style>
    <!-- Link to the manifest file -->
<link rel="manifest" href="./manifest.json">

<!-- Register the Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(registration => {
          console.log('Service Worker registered successfully');
        })
        .catch(error => {
          console.log('Service Worker registration failed:', error);
        });
    });
  }
</script>
</head>
<body>

    <div id="main-view">
        <h1>Organiser</h1>
        <div id="filter-bar" style="display: none;"></div>
        <div id="task-grid"></div>
        <div id="bottom-bar">
            <button class="btn btn-icon" onclick="openSettings()">&#9881;&#65039;</button>
            <button class="btn btn-primary" onclick="openEditor(null)">+ New Task</button>
        </div>
    </div>

    <!-- Editor Modal -->
    <div id="editor-modal" class="modal">
        <div class="modal-content" id="editor-content-box">
            <div class="modal-header">Edit Task</div>
            
            <input type="text" id="edit-title" class="editor-input" placeholder="Task Name...">
            
            <div class="form-row">
                <div class="form-group">
                    <span class="form-label">Next Due Date</span>
                    <input type="date" id="edit-date" class="form-control">
                </div>
                <div class="form-group">
                    <span class="form-label">Time of Day</span>
                    <input type="time" id="edit-time" class="form-control">
                </div>
            </div>

            <!-- NEW: One-off Checkbox -->
            <div class="form-row" style="margin-bottom: 8px;">
                <label style="display: flex; align-items: center; gap: 8px; color: white; font-size: 14px; cursor: pointer;">
                    <input type="checkbox" id="edit-is-one-off" style="width: 18px; height: 18px;" onchange="toggleIntervalVisibility()">
                    This is a one-off event
                </label>
            </div>

            <div class="form-row" id="interval-section">
                <div class="form-group">
                    <span class="form-label">Interval</span>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="edit-interval-val" class="form-control" min="1" value="1" style="width: 70px;">
                        <select id="edit-interval-type" class="form-control">
                            <option value="days">Days</option>
                            <option value="months">Months</option>
                            <option value="years">Years</option>
                        </select>
                    </div>
                </div>
            </div>

            <textarea id="edit-desc" class="editor-input" placeholder="Brief description (Use #tags here...)"></textarea>
            
            <div class="modal-actions" style="justify-content: space-between;">
                <button class="text-btn" id="delete-btn" style="color: var(--md-sys-color-on-surface-variant);" onclick="deleteTask()">&#128465;&#65039; DELETE</button>
                <div>
                    <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('editor-modal')">CANCEL</button>
                    <button class="text-btn" style="color: var(--md-sys-color-primary);" onclick="saveTask()">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Settings & Backup</div>
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="color: var(--md-sys-color-on-surface-variant); text-align: center; margin-bottom: 24px;">
                    Backup or restore your recurring tasks.
                </p>
                <button class="settings-btn" onclick="exportData()">&#128228; Export Backup (JSON)</button>
                <button class="settings-btn" onclick="document.getElementById('import-file').click()">&#128229; Import Backup</button>
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
            </div>
            <div class="modal-actions">
                <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('settings-modal')">CLOSE</button>
            </div>
        </div>
    </div>

<script>
    let tasks = JSON.parse(localStorage.getItem('md_organiser_tasks')) || [];
    let currentEditId = null;
    let activeTagFilter = null; 

    // Helper: Extracts tags
    function extractTags(text) {
        const regex = /#([a-zA-Z0-9_-]+)/g;
        const tags = new Set();
        let match;
        while ((match = regex.exec(text)) !== null) {
            tags.add(match[1]);
        }
        return Array.from(tags);
    }

    // Helper: Calculates background color based on status
    function getStatusColor(nextDueTimestamp) {
        const now = new Date();
        const dueDate = new Date(nextDueTimestamp);

        if (nextDueTimestamp < now.getTime()) return 'var(--status-red)';

        const isToday = dueDate.getDate() === now.getDate() && dueDate.getMonth() === now.getMonth() && dueDate.getFullYear() === now.getFullYear();
        if (isToday) return 'var(--status-orange)';

        const diff = nextDueTimestamp - now.getTime();
        const twoDaysMs = 2 * 24 * 60 * 60 * 1000;
        if (diff <= twoDaysMs) return 'var(--status-green)';

        return 'var(--status-blue)';
    }

    // Helper: Gets category for headers
    function getTaskCategory(nextDueTimestamp) {
        const now = new Date();
        const dueDate = new Date(nextDueTimestamp);

        if (nextDueTimestamp < now.getTime()) return { name: 'Overdue', icon: '⚠️', color: '#FFB4AB' };
        
        const isToday = dueDate.getDate() === now.getDate() && dueDate.getMonth() === now.getMonth() && dueDate.getFullYear() === now.getFullYear();
        if (isToday) return { name: 'Today', icon: '🔥', color: '#ffb400' };
        
        const diff = nextDueTimestamp - now.getTime();
        const twoDaysMs = 2 * 24 * 60 * 60 * 1000;
        if (diff <= twoDaysMs) return { name: 'Upcoming', icon: '⏳', color: 'var(--md-sys-color-primary)' };
        
        return { name: 'Later', icon: '📅', color: 'var(--md-sys-color-on-surface-variant)' };
    }

    // Helper: Calculates countdown string
    function getCountdownText(nextDue) {
        const now = new Date().getTime();
        const diff = nextDue - now;
        const isOverdue = diff < 0;
        const absDiff = Math.abs(diff);

        const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

        let text = '';
        if (days > 14) {
            const weeks = Math.floor(days / 7);
            const remDays = days % 7;
            text = `${weeks}w ${remDays}d`;
        } else if (days > 0) {
            text = `${days}d ${hours}h`;
        } else {
            text = `${hours}h`;
        }

        return isOverdue ? `${text} overdue` : `In ${text}`;
    }

    // Toggles interval visibility based on the one-off checkbox
    function toggleIntervalVisibility() {
        const isOneOff = document.getElementById('edit-is-one-off').checked;
        document.getElementById('interval-section').style.display = isOneOff ? 'none' : 'flex';
    }

    function saveToStorage() {
        tasks.sort((a, b) => a.nextDue - b.nextDue);
        localStorage.setItem('md_organiser_tasks', JSON.stringify(tasks));
        renderGrid();
    }

    function setTagFilter(tag) {
        activeTagFilter = tag;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('task-grid');
        const filterBar = document.getElementById('filter-bar');
        grid.innerHTML = '';

        if(tasks.length === 0) {
            filterBar.style.display = 'none';
            grid.innerHTML = '<p style="text-align:center; color:gray; margin-top: 20px;">No tasks yet. Create one below!</p>';
            return;
        }

        let allTags = new Set();
        tasks.forEach(t => {
            const tags = extractTags((t.description || '') + ' ' + (t.title || ''));
            tags.forEach(tag => allTags.add(tag));
        });

        if (allTags.size > 0) {
            filterBar.style.display = 'flex';
            filterBar.innerHTML = `<div class="tag-chip ${activeTagFilter === null ? 'active-filter' : ''}" onclick="setTagFilter(null)" style="cursor:pointer;">All</div>`;
            Array.from(allTags).sort().forEach(tag => {
                const isActive = activeTagFilter === tag;
                filterBar.innerHTML += `<div class="tag-chip ${isActive ? 'active-filter' : ''}" onclick="setTagFilter('${tag}')" style="cursor:pointer;">#${escapeHtml(tag)}</div>`;
            });
        } else {
            filterBar.style.display = 'none';
        }

        let displayTasks = tasks;
        if (activeTagFilter) {
            displayTasks = tasks.filter(t => {
                const tags = extractTags((t.description || '') + ' ' + (t.title || ''));
                return tags.includes(activeTagFilter);
            });
        }

        if(displayTasks.length === 0 && activeTagFilter) {
            grid.innerHTML = '<p style="text-align:center; color:gray; margin-top: 20px;">No tasks found for this tag.</p>';
            return;
        }

        let currentCategory = null;

        displayTasks.forEach((task) => {
            const categoryData = getTaskCategory(task.nextDue);
            
            if (categoryData.name !== currentCategory) {
                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = `<span style="color: ${categoryData.color}; font-size: 16px;">${categoryData.icon}</span> ${categoryData.name}`;
                grid.appendChild(header);
                currentCategory = categoryData.name;
            }

            const dateObj = new Date(task.nextDue);
            const dateStr = dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
            
            const card = document.createElement('div');
            card.className = 'task-card';
            card.style.backgroundColor = getStatusColor(task.nextDue);
            
            card.addEventListener('click', (e) => {
                if(!e.target.closest('.complete-btn')) openEditor(task.id);
            });

            // Handle Interval Text & One-Offs
            let val = task.intervalVal || task.intervalDays || 1;
            let type = task.intervalType || 'days';
            let intervalText = '';
            
            if (task.isOneOff) {
                intervalText = 'One-off';
            } else if (type === 'months') {
                intervalText = val == 1 ? 'Monthly' : `Every ${val} months`;
            } else if (type === 'years') {
                intervalText = val == 1 ? 'Annually' : `Every ${val} years`;
            } else {
                intervalText = val == 1 ? 'Daily' : val == 7 ? 'Weekly' : `Every ${val} days`;
            }

            // Extract tags for display
            const itemTags = extractTags((task.description || '') + ' ' + (task.title || ''));
            const itemTagsHtml = itemTags.map(t => `<div class="tag-chip" style="color: var(--md-sys-color-primary);">#${escapeHtml(t)}</div>`).join('');

            // Clean description for preview
            let cleanDesc = (task.description || '').replace(/#([a-zA-Z0-9_-]+)/g, '').trim();

            // Calculate Countdown
            const countdownText = getCountdownText(task.nextDue);
            const isOverdue = task.nextDue < new Date().getTime();
            const countdownColor = isOverdue ? 'var(--md-sys-color-error)' : 'var(--md-sys-color-on-surface-variant)';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">${escapeHtml(task.title)}</div>
                    <button class="complete-btn" onclick="completeTask('${task.id}'); event.stopPropagation();" title="Mark Completed">&#10004;</button>
                </div>
                <div class="card-date" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>&#128197; Due: ${dateStr} at ${task.actionTime}</span>
                    <span style="color: ${countdownColor}; font-weight: bold;">${countdownText}</span>
                </div>
                ${cleanDesc ? `<div class="card-preview">${escapeHtml(cleanDesc)}</div>` : ''}
                <div class="tags-container">
                    <div class="tag-chip" style="background: rgba(0,0,0,0.3);">&#128260; ${intervalText}</div>
                    ${itemTagsHtml}
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    function completeTask(id) {
        const taskIndex = tasks.findIndex(t => t.id === id);
        if (taskIndex === -1) return;
        
        const task = tasks[taskIndex];
        
        // If it's a one-off, delete it instead of renewing
        if (task.isOneOff) {
            tasks.splice(taskIndex, 1);
            saveToStorage();
            return;
        }
        
        const nextDate = new Date(task.nextDue);
        const val = parseInt(task.intervalVal || task.intervalDays || 1);
        const type = task.intervalType || 'days';

        if (type === 'months') {
            nextDate.setMonth(nextDate.getMonth() + val);
        } else if (type === 'years') {
            nextDate.setFullYear(nextDate.getFullYear() + val);
        } else {
            nextDate.setDate(nextDate.getDate() + val);
        }
        
        const [hours, minutes] = task.actionTime.split(':');
        nextDate.setHours(parseInt(hours), parseInt(minutes), 0, 0);
        
        task.nextDue = nextDate.getTime();
        
        saveToStorage(); 
    }

    function openEditor(id) {
        currentEditId = id;
        const titleInput = document.getElementById('edit-title');
        const descInput = document.getElementById('edit-desc');
        const intervalValInput = document.getElementById('edit-interval-val');
        const intervalTypeInput = document.getElementById('edit-interval-type');
        const timeInput = document.getElementById('edit-time');
        const dateInput = document.getElementById('edit-date');
        const isOneOffInput = document.getElementById('edit-is-one-off');
        const delBtn = document.getElementById('delete-btn');

        if (id) {
            const task = tasks.find(t => t.id === id);
            titleInput.value = task.title;
            descInput.value = task.description;
            intervalValInput.value = task.intervalVal || task.intervalDays || 1;
            intervalTypeInput.value = task.intervalType || 'days';
            timeInput.value = task.actionTime;
            isOneOffInput.checked = task.isOneOff || false;
            
            const d = new Date(task.nextDue);
            dateInput.value = d.toLocaleDateString('en-CA'); 
            
            delBtn.style.display = 'block';
        } else {
            titleInput.value = '';
            descInput.value = '';
            intervalValInput.value = 1;
            intervalTypeInput.value = 'days';
            isOneOffInput.checked = false;
            
            const now = new Date();
            dateInput.value = now.toLocaleDateString('en-CA');
            timeInput.value = '09:00';
            
            delBtn.style.display = 'none';
        }
        
        toggleIntervalVisibility();
        document.getElementById('editor-modal').classList.add('active');
    }

    function saveTask() {
        const title = document.getElementById('edit-title').value.trim() || 'Untitled Task';
        const description = document.getElementById('edit-desc').value.trim();
        const intervalVal = parseInt(document.getElementById('edit-interval-val').value) || 1;
        const intervalType = document.getElementById('edit-interval-type').value;
        const actionTime = document.getElementById('edit-time').value || '09:00';
        const dateVal = document.getElementById('edit-date').value;
        const isOneOff = document.getElementById('edit-is-one-off').checked;
        
        const nextDue = new Date(`${dateVal}T${actionTime}`).getTime();

        if (currentEditId) {
            const index = tasks.findIndex(t => t.id === currentEditId);
            tasks[index] = { ...tasks[index], title, description, intervalVal, intervalType, actionTime, nextDue, isOneOff };
        } else {
            tasks.push({ id: 'org_' + Date.now(), title, description, intervalVal, intervalType, actionTime, nextDue, isOneOff });
        }

        saveToStorage();
        closeModal('editor-modal');
    }

    function deleteTask() {
        if(confirm("Are you sure you want to delete this task?")) {
            tasks = tasks.filter(t => t.id !== currentEditId);
            if(activeTagFilter) {
                const stillExists = tasks.some(t => extractTags((t.description || '') + ' ' + (t.title || '')).includes(activeTagFilter));
                if(!stillExists) activeTagFilter = null;
            }
            saveToStorage();
            closeModal('editor-modal');
        }
    }

    function openSettings() { document.getElementById('settings-modal').classList.add('active'); }
    
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "organiser_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedTasks = JSON.parse(e.target.result);
                if(Array.isArray(importedTasks)) {
                    tasks = importedTasks;
                    saveToStorage();
                    closeModal('settings-modal');
                    alert("Backup imported successfully!");
                } else {
                    alert("Invalid backup file structure.");
                }
            } catch (err) {
                alert("Error reading file: " + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

    renderGrid();

    // Auto-refresh the grid every 60 seconds to keep countdowns accurate
    setInterval(() => {
        if (tasks.length > 0) {
            renderGrid();
        }
    }, 60000);
</script>
</body>
</html>
